name: stern_app
description: "Stern BLE App - Manage Stern hygiene products via Bluetooth"
publish_to: 'none'

version: 1.0.67+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Bluetooth BLE
  flutter_blue_plus: ^1.35.3

  # Local database
  sqflite: ^2.4.2
  path: ^1.9.0

  # Preferences storage
  shared_preferences: ^2.5.3

  # Navigation
  go_router: ^14.0.0

  # Event bus (replaces Android EventBus)
  event_bus: ^2.0.0

  # Permission handling
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: AvenirHeavy
      fonts:
        - asset: assets/fonts/AvenirHeavy.ttf
          weight: 700
    - family: AvenirMedium
      fonts:
        - asset: assets/fonts/AvenirMedium.ttf
          weight: 500
